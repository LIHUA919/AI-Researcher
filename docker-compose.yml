services:
  ai-researcher:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: ai_researcher
    ports:
      - "8000:8000"
    volumes:
      - ./workplace:/workplace
    environment:
      - PYTHONUNBUFFERED=1
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
